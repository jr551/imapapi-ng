# Example docker-compose configuration for testing IMAP API with mailcow
# This can be used as a reference for integrating IMAP API into mailcow

version: '3.8'

services:
  imapapi-mailcow:
    build:
      context: .
      dockerfile: Dockerfile
    image: imapapi-mailcow:latest
    hostname: imapapi-mailcow
    restart: always
    environment:
      - TZ=Europe/Berlin
      # Use mailcow's redis - adjust database if needed
      - REDIS_URL=redis://redis-mailcow:6379/8
      - API_HOST=0.0.0.0
      - API_PORT=3000
      - LOG_LEVEL=info
    ports:
      - "3001:3000"
    depends_on:
      - redis-mailcow
    networks:
      mailcow-network:
        aliases:
          - imapapi-mailcow
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - imapapi-logs:/var/log/imapapi
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Example: Override nginx to proxy IMAP API through HTTPS
  # nginx-mailcow:
  #   volumes:
  #     - ./data/conf/nginx/site.imapapi.custom:/etc/nginx/sites-available/site.imapapi.conf:ro
  #   environment:
  #     - ADDITIONAL_SERVER_NAMES=imapapi.example.com

volumes:
  imapapi-logs:

networks:
  mailcow-network:
    external: true
    name: mailcow_mailcow-network