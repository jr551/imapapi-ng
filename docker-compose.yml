version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  imapapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: imapapi:latest
    hostname: imapapi
    restart: always
    environment:
      - TZ=UTC
      - REDIS_URL=redis://redis:6379/8
      - API_HOST=0.0.0.0
      - API_PORT=3000
      - LOG_LEVEL=info
    ports:
      - "3000:3000"
    depends_on:
      - redis
    volumes:
      - imapapi-logs:/var/log/imapapi
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis-data:
  imapapi-logs: