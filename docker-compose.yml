# imapapi — minimal mailcow addon
#
# Install on the mailcow host *outside* /opt/mailcow-dockerized (e.g. /opt/imapapi/)
# so mailcow's update.sh (which resets its own working tree) never touches this.
#
# The service joins mailcow's existing docker network as "external" and reaches
# Dovecot at dovecot-mailcow:143. Override MAILCOW_NETWORK if a future mailcow
# version renames its network.

services:
  imapapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: imapapi-mailcow:2.0.0
    container_name: imapapi-mailcow
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${PORT:-3001}
      HOST: 0.0.0.0
      IMAP_HOST: ${IMAP_HOST:-dovecot-mailcow}
      IMAP_PORT: ${IMAP_PORT:-143}
      IMAP_SECURE: ${IMAP_SECURE:-false}
      IMAP_TLS_REJECT_UNAUTHORIZED: ${IMAP_TLS_REJECT_UNAUTHORIZED:-true}
      CACHE_PATH: /data/cache.db
      CACHE_TTL_VALID_MS: ${CACHE_TTL_VALID_MS:-60000}
      CACHE_TTL_INVALID_MS: ${CACHE_TTL_INVALID_MS:-10000}
      POOL_MAX: ${POOL_MAX:-50}
      POOL_IDLE_MS: ${POOL_IDLE_MS:-30000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${BIND_ADDR:-0.0.0.0}:${PORT:-3001}:${PORT:-3001}"
    volumes:
      - imapapi-data:/data
    networks:
      - mailcow-network
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  imapapi-data:

networks:
  mailcow-network:
    external: true
    name: ${MAILCOW_NETWORK:-mailcowdockerized_mailcow-network}
